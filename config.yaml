# Silver-Bullet-ML-BMAD Configuration
# DO NOT commit actual credentials to this file
# Use environment variables for sensitive data

system:
  environment: development  # development, testing, production
  log_level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL

data:
  dollar_bar_threshold: 50000000  # $50M notional value
  data_completeness_target: 0.9999  # 99.99%

trading:
  symbol: MNQ  # Micro E-mini Nasdaq-100
  exchange: CME
  timezone: America/New_York

risk:
  daily_loss_limit: 500  # USD
  max_drawdown_percent: 12  # percent
  max_position_size: 5  # contracts

ml:
  # DEPLOYMENT CONFIGURATION (2026-04-13)
  # Using Hybrid Regime-Aware System with 40% threshold
  # See: DEPLOYMENT_CONFIGURATION_40PCT_THRESHOLD.md

  probability_threshold: 0.40  # 40% threshold for hybrid regime-aware system
  model_type: "regime_aware"  # Use hybrid regime-aware models
  model_path: "models/xgboost/regime_aware_tier1/"  # ✅ Tier 1 models (17 features) - VALIDATED
  use_regime_aware: true  # Enable HMM regime detection

  # Tier 1 Model Configuration (2026-04-15)
  # Advanced 1-minute models with order flow, volatility, microstructure features
  # See: 1minute_migration_completion_summary.md
  # ✅ VALIDATED: 95.34% win rate, 19.2 trades/day, Sharpe 688.7
  tier1_models:
    enabled: true  # ✅ ENABLED - Tier 1 models validated and performing excellently
    model_path: "models/xgboost/regime_aware_tier1/"
    feature_count: 17  # Tier 1 uses 17 features vs 52 baseline (auto-detected)
    description: "Order flow, volatility, microstructure features for 1-minute data"
    # Safety thresholds - models below these values won't be used
    min_precision_threshold: 0.60  # Minimum 60% precision required
    min_win_rate_threshold: 0.50   # Minimum 50% win rate required

  # Regime detection settings
  regime_detection:
    enabled: true
    model_path: "models/hmm/regime_model_1min/"  # 1-minute HMM model
    n_regimes: 3
    feature_window: 100  # Bars for HMM features

  # Bar-by-bar evaluation settings
  bar_evaluation:
    enabled: true  # Evaluate every 1-minute bar (not signal-based)
    min_bars_between_trades: 1  # 1 minute at 1-min bars (vs 30 for 5-min system)
    probability_threshold: 0.40  # 40% threshold

  # Triple-barrier exit parameters
  exits:
    take_profit_pct: 0.003  # 0.3%
    stop_loss_pct: 0.002  # 0.2%
    max_hold_minutes: 30

  retraining_interval_days: 7  # Weekly retraining

  # NEW: Time filters to avoid worst-performing periods
  time_filters:
    enabled: true
    exclude_hours: [13, 14, 15, 16, 17]  # Exclude 1 PM - 5 PM (worst performance)
    skip_thursday: true  # Skip Thursday trading (consistent underperformance)

  # NEW: Statistical drift detection (Epic 5 Phase 2)
  drift_detection:
    enabled: true
    check_interval_hours: 1  # Check for drift every hour
    rolling_window_hours: 24  # Use last 24 hours for recent data
    retention_days: 30  # Keep drift metrics for 30 days

    # PSI (Population Stability Index) configuration
    psi:
      bins: 10  # Number of bins for PSI calculation (deciles)
      threshold_moderate: 0.2  # PSI > 0.2 indicates moderate drift
      threshold_severe: 0.5  # PSI > 0.5 indicates severe drift

    # KS (Kolmogorov-Smirnov) test configuration
    ks_test:
      p_value_threshold: 0.05  # p-value < 0.05 indicates significant drift

    # Baseline data paths (loaded from model metadata)
    baseline:
      training_data_path: "data/processed/dollar_bars/1_minute"
      feature_columns: null  # Will be auto-detected from FeatureEngineer

    # Alert configuration
    alerts:
      log_file: "logs/drift_events.csv"
      dashboard_integration: true  # Will be used in Story 5.2.2

  # NEW: Automated retraining triggers (Epic 5 Phase 2: Story 5.2.3)
  retraining:
    enabled: false  # Disabled by default (enable in production)
    mode: "auto"  # "auto" or "manual"

    # Trigger thresholds
    trigger:
      psi_threshold: 0.5  # Severe drift threshold (PSI > 0.5)
      ks_p_value_threshold: 0.01  # Highly significant threshold (p-value < 0.01)
      min_interval_hours: 24  # Minimum time between retrainings
      min_samples: 1000  # Minimum new samples required

    # Validation criteria
    validation:
      brier_score_max: 0.2  # Maximum Brier score (calibration quality)
      win_rate_min_delta: 0.0  # Minimum win rate change (no degradation)
      feature_stability_threshold: 0.3  # Max feature importance change

    # Execution settings
    execution:
      async_enabled: true  # Run retraining in background
      timeout_minutes: 60  # Maximum retraining time
      max_concurrent_retrainings: 1  # Prevent overlapping retrainings

    # Model versioning
    model_versioning:
      backup_count: 5  # Number of old models to keep
      models_dir: "models/xgboost/1_minute"
      metadata_file: "models/model_lineage.json"

silver_bullet_premium:
  enabled: true
  min_fvg_gap_size_dollars: 75  # Filter small FVGs
  mss_volume_ratio_min: 2.0  # Increased from 1.5x (baseline)
  max_bar_distance: 7  # Reduced from 20 bars (baseline)
  ml_probability_threshold: 0.65  # Use baseline until premium model trained
  # Note: require_killzone_alignment removed - baseline already filters to killzones only
  max_trades_per_day: 20  # Maximum daily trade limit

  # FINAL OPTIMIZED PARAMETERS (2025 validated)
  # INVERTED QUALITY: 0-85 range (lower quality = better performance)
  min_quality_score: 0  # NO MINIMUM (inverted from 70)
  max_quality_score: 85  # MAXIMUM to avoid worst quality

  # OPTIMIZED STOP PLACEMENT
  stop_multiplier: 1.5  # Wider stops (reduce premature exits)

  # Phase 1 Optimizations
  # Killzone quality weights - accept different % of signals by killzone
  # This is MORE effective than a simple binary killzone filter
  killzone_quality_weights:
    London AM: 0.90   # Accept 90% of signals (highest quality - $2.67 avg return)
    NY PM: 0.80       # Accept 80% of signals (good quality - $1.99 avg return)
    NY AM: 0.60       # Accept 60% of signals (lowest quality - $0.94 avg return)

  # Day of week multipliers - adjust daily limits by day
  day_of_week_multipliers:
    Monday: 1.2      # +20% max trades (best day - 85.75% win rate)
    Tuesday: 0.6     # -40% max trades (worst day - 82.57% win rate)
    Wednesday: 1.0   # Normal
    Thursday: 1.1    # +10% max trades (good day - 85.74% win rate)
    Friday: 1.0      # Normal

  # Dynamic stop loss management
  dynamic_stop_loss_enabled: true
  early_exit_loss_threshold: 0.5  # Exit at 50% of initial risk (cuts losses from -$16.52 to ~-$8)
  trailing_stop_enabled: true
  trailing_stop_trigger: 0.5  # Move to breakeven at 50% of target

  # NEW: Asymmetric stop multipliers for different market conditions
  # Addresses 2025 uptrending market creating distant swing highs
  bullish_stop_multiplier: 0.75  # Tighter stops for bullish (fixes 77% wider stop issue)
  bearish_stop_multiplier: 1.50  # Standard stops for bearish

monitoring:
  health_check_interval_seconds: 5
  data_staleness_threshold_seconds: 30

