# Regime 0-Only Deployment Configuration
# Conservative deployment based on proper OOS validation
# Date: 2026-04-15
# Validation: _bmad-output/validation_audit_report.md

ml:
  # Use Tier 1 pipeline for regime-aware trading
  pipeline: "HybridMLPipelineTier1"

  # Regime trading configuration
  trade_regime_0: true   # ✅ DEPLOY - 87.28% OOS win rate
  trade_regime_1: false  # ❌ SKIP - 34% win rate
  trade_regime_2: false  # ❌ SKIP - 24% OOS win rate, overfits

  # Probability thresholds (conservative)
  thresholds:
    regime_0: 0.40  # 40% - Balances win rate (94%) and trade frequency
    # Note: Higher thresholds (45%+) improve win rate but reduce signals
    # 40% provides good balance based on OOS validation

  # Model paths
  models:
    regime_0: "models/xgboost/regime_aware_tier1/xgboost_regime_0_tier1.joblib"
    regime_1: null  # Not used
    regime_2: null  # Not used

  # Feature configuration
  features:
    type: "tier1"
    list:
      - volume_imbalance_3
      - volume_imbalance_5
      - volume_imbalance_10
      - cumulative_delta_20
      - cumulative_delta_50
      - cumulative_delta_100
      - realized_vol_15
      - realized_vol_30
      - realized_vol_60
      - vwap_deviation_5
      - vwap_deviation_10
      - vwap_deviation_20
      - bid_ask_bounce
      - noise_adj_momentum_5
      - noise_adj_momentum_10
      - noise_adj_momentum_20

# Risk management (conservative for Regime 0-only strategy)
risk:
  max_position_size: 1  # 1 MNQ contract
  daily_loss_limit: 500  # USD
  max_drawdown_percent: 10  # Conservative limit

  # Triple-barrier exits
  take_profit_percent: 0.3  # 0.3%
  stop_loss_percent: 0.2    # 0.2%
  time_exit_minutes: 30     # 30 minutes

# Expected performance (OOS validated, conservative)
performance:
  expected_sharpe: 1.5-2.0  # Conservative estimate from OOS validation
  expected_win_rate: 0.85-0.90  # 87.28% OOS validated
  expected_trade_frequency: 0-5/day  # Regime 0 occurs ~7% of time

  # Risk assessment
  risk_level: LOW
  risk_notes: "Regime 0 model proven OOS with 87% win rate. Limited trade frequency due to regime rarity."

# Monitoring requirements
monitoring:
  track_metrics:
    - win_rate
    - sharpe_ratio
    - regime_distribution
    - trade_frequency
    - max_drawdown

  alert_thresholds:
    min_win_rate: 0.80  # Alert if below 80%
    min_sharpe: 1.0     # Alert if Sharpe below 1.0
    max_drawdown: 0.10   # Alert if drawdown exceeds 10%

# Deployment metadata
deployment:
  date: 2026-04-15
  version: "regime_0_only_conservative"
  validation_report: "_bmad-output/validation_audit_report.md"
  corrected_deployment_config: "_bmad-output/corrected_deployment_config.md"

  # Deployment status
  status: "ready_for_paper_trading"
  validation_period: "4-6 weeks minimum"

  # Success criteria
  success_criteria:
    sharpe_ratio: ">= 1.5"
    win_rate: ">= 0.85"
    max_drawdown: "< 0.10"
    validation_duration: "4-6 weeks"
