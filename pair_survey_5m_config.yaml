# Cross-Pair Divergence-Fade Survey — 5-MINUTE timeframe extension (2026-06-12)
#
# Frozen BEFORE any 5m simulation runs. See
# _bmad-output/precommit_pair_survey_addendum_5m_2026-06.md for hypothesis,
# multiplicity disclosure, and decision rule. One-shot extension of the closed
# 1-min survey (prereg b54fb08 + 9f4ae9a): same pairs, same structure, 5m bars.
#
# Grid scaling rationale (frozen): 5m residuals are ~sqrt(5)=2.24x the 1-min
# scale, so the validated 1-min primary ($40) maps to ~$89; primary frozen at
# $80 (rounded down, keeps 2.0x stop cells under the $150 cap at lower rungs).
# All bar-count parameters (beta 60, spread 5, hold 30) unchanged in BAR units.

global:
  bar_minutes: 5
  dev_start: "2025-05-01"
  dev_end: "2026-02-28"
  rth_start: "09:30"
  session_close: "15:55"
  beta_window: 60
  spread_window: 5
  hold_max: 30
  thresh_usd_grid: [40, 60, 80, 100]
  stop_mults: [1.0, 2.0]
  primary_thresh_usd: 80
  primary_stop_mult: 1.0
  stop_cap_usd: 150.0           # unchanged; 2.0x cells above $75 self-cap to zero
  gate0:
    ev_min: 0.0
    freq_min: 1.0
    worst_month_wr_min: 0.35
  metals_alt_session: ["08:30", "13:25"]
  grid_csv: _bmad-output/pair_survey_gate0_grid_5m.csv

# Same universe as the 1-min survey. MNQ_ES is a candidate here, not a control
# (no validated 5m template exists); its 1-min numbers are the reference prior.
pairs:
  - name: SI_GC
    order: 1
    description: "Silver vs gold — 5m"
    leg_a: {root: SI, csvs: [data/processed/dollar_bars/1_minute/si_1min_2025_2026.csv]}
    leg_b: {root: GC, csvs: [data/processed/dollar_bars/1_minute/gc_1min_2025_2026.csv]}
    traded_micro: SIL
    point_value: 1000.0
    tick_size: 0.005
    tick_value: 5.0
    commission_rt: 3.74
