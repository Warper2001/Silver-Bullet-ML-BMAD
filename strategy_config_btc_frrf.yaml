# strategy_config_btc_frrf.yaml — BTC Funding Rate Regime Filter (FRRF / S27)
# Pre-registration: _bmad-output/preregistration_btc_frrf.md
# Sealed: 2026-05-31
# DO NOT change any value without a new pre-registration commit first.
#
# Hypothesis: When 8h mark/spot basis (funding rate proxy) > +0.03%/8h,
# the market is crowded long → enter SHORT on H1 bearish sweep + M15 CHoCH + M1 bearish FVG.
# When basis < -0.02%/8h, the market is crowded short → enter LONG on H1 bullish sweep + M1 bullish FVG.
# Neutral zone (75.9% of time historically): no entries.
#
# This is "quant crypto standard": perpetuals funding rate mechanics have no
# equivalent in traditional markets. Source: BIS WP 1087 (Sharpe 12.8 for
# BTC carry), ScienceDirect funding rate study (15-35% annual delta-neutral).
#
# Funding rate data: data/kraken/PF_XBTUSD_funding_rate.csv
# Derived from Kraken mark/spot 1h charts (mark-spot)/spot averaged per 8h window.
#
# BTC calibration vs MNQ S25:
#   atr_threshold: 0.25  (BTC 1-min ATR ~100-150pts; FVGs ~30-50pts)
#   min_gap_atr_ratio: 0.04  (BTC H1 ATR ~700pts; min gap = 28pts)
#   max_gap_dollars: 150.0  (gap_pts × POINT_VALUE_USD(2.0) cap = 300pts max)
#   bearish_only: false  — bidirectional; funding bias restricts which path fires
#   funding_rate_filter_enabled: true  — primary regime filter
#   m15_confirmation: true  — CHoCH required for SHORT path only
#   enable_kill_zone_filter: false  — funding replaces time filter

sl_multiplier: 5.0
tp_multiplier: 6.0
entry_pct: 0.5
atr_threshold: 0.25
max_gap_dollars: 150.0
max_hold_bars: 60
max_pending_bars: 240
contracts_per_trade: 1
max_daily_loss: -500.0
vol_regime_lookback: 120
vol_regime_threshold: 0.75
min_gap_atr_ratio: 0.04
ml_threshold: 0.0
bearish_only: false
h1_sweep_lookback: 6
tuesday_exclusion: false
m15_confirmation: true
enable_kill_zone_filter: false
kill_zone_start_et: "17:00"
kill_zone_end_et: "19:00"
commission_per_roundtrip: 0.04
enable_ifvg_fallback: false
funding_rate_filter_enabled: true
funding_rate_short_threshold: 0.0003
funding_rate_long_threshold: -0.0002
